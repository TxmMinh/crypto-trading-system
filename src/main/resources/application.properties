spring.application.name=crypto-trading-system
# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:cryptodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Initialize seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.crypto.trading=DEBUG
logging.level.org.springframework.web=INFO

# Scheduler
crypto.scheduler.interval-ms=10000
crypto.scheduler.initial-delay-ms=1000

# External APIs
crypto.binance.url=https://api.binance.com/api/v3/ticker/bookTicker
crypto.huobi.url=https://api.huobi.pro/market/tickers

# Supported trading pairs
crypto.supported-pairs=ETHUSDT,BTCUSDT

# Default user
crypto.default.user-id=1
crypto.default.initial-balance=50000.00

# HTTP client timeouts (ms)
crypto.http.connect-timeout-ms=5000
crypto.http.read-timeout-ms=5000
